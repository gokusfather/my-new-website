{% extends "base.html" %}

{% block content %}
    <h1>Contact Me</h1>
    <p>Have a question or want to collaborate? Get in touch!</p>
    
    <div style="margin: 30px 0; padding: 30px; background: #f9f9f9; border-radius: 10px;">
        <form>
            <div style="margin-bottom: 15px;">
                <label for="name" style="display: block; font-weight: bold;">Name:</label>
                <input type="text" id="name" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="email" style="display: block; font-weight: bold;">Email:</label>
                <input type="email" id="email" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="message" style="display: block; font-weight: bold;">Message:</label>
                <textarea id="message" rows="4" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
    
    <div style="margin-top: 20px;">
        <p>📧 Email: fxwindow66@gmail.com</p>
        <p>🐙 GitHub: <a href="https://github.com/gokusfather">github.com/gokusfather</a></p>
    </div>
    
    <a href="/" class="btn">← Back Home</a>
{% endblock %}
